<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>시스템 아키텍처</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Song+Myung&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #0d0d1a;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
        }
        .slide-container {
            width: 100vw; height: 100vh;
            position: relative;
            background-color: #0d0d1a;
            display: flex; flex-direction: column;
            color: #ffffff; box-sizing: border-box;
        }

        /* Background Pattern */
        .bg-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(123, 47, 190, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            z-index: 0;
        }
        
        .border-line { position: absolute; background-color: rgba(212, 175, 55, 0.3); z-index: 1; }
        .border-top { top: 30px; left: 30px; right: 30px; height: 1px; }
        .border-bottom { bottom: 30px; left: 30px; right: 30px; height: 1px; }

        .header { position: absolute; top: 40px; left: 50px; z-index: 10; }
        .title { font-family: 'Song Myung', serif; font-size: 2.5rem; color: #d4af37; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .subtitle { font-size: 1rem; color: #94a3b8; font-weight: 300; margin-top: 0.5rem; }

        /* Diagram Layer */
        .diagram-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

        .node { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 200px; z-index: 10; }
        .node-icon-wrapper {
            width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; margin-bottom: 10px; background-color: #1a1a2e; border: 2px solid; position: relative;
        }
        .node-content { background-color: rgba(26, 26, 46, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 12px; border-radius: 8px; text-align: center; backdrop-filter: blur(4px); width: 100%; }
        .node-title { font-weight: 700; font-size: 1rem; margin-bottom: 2px; color: #f1f5f9; }
        .node-desc { font-size: 0.75rem; color: #94a3b8; line-height: 1.3; }

        /* Node Styles */
        .node-server .node-icon-wrapper { width: 100px; height: 100px; font-size: 2.5rem; border-color: #7b2fbe; color: #d4af37; box-shadow: 0 0 20px rgba(123, 47, 190, 0.3); }
        .node-qr .node-icon-wrapper { border-color: #d4af37; color: #fcd34d; }
        .node-user .node-icon-wrapper { border-color: #7b2fbe; color: #a78bfa; }
        .node-manager .node-icon-wrapper { border-color: #d4af37; color: #fcd34d; }
        .node-dev .node-icon-wrapper { border-color: #0d7377; color: #2dd4bf; }

        /* Positions (Responsive) */
        .pos-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .pos-top { top: 20%; left: 50%; transform: translateX(-50%); }
        .pos-left { top: 50%; left: 15%; transform: translateY(-50%); }
        .pos-right { top: 50%; right: 15%; transform: translateY(-50%); }
        .pos-bottom { bottom: 15%; left: 50%; transform: translateX(-50%); }

        .flow-label {
            position: absolute; background-color: #0d0d1a; border: 1px solid rgba(212, 175, 55, 0.3);
            color: #cbd5e1; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; z-index: 6;
            transform: translate(-50%, -50%); white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="slide-container">
    <div class="bg-pattern"></div>
    <div class="border-line border-top"></div>
    <div class="border-line border-bottom"></div>

    <div class="header">
        <h1 class="title">전체 시스템 흐름</h1>
        <p class="subtitle">중앙 서버 중심의 데이터 연결 및 상호작용 구조</p>
    </div>

    <svg class="diagram-layer" viewBox="0 0 1280 720">
        <defs>
            <marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#64748b" points="0 0, 10 3.5, 0 7"></polygon></marker>
            <marker id="arrowhead-gold" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#d4af37" points="0 0, 10 3.5, 0 7"></polygon></marker>
            <marker id="arrowhead-purple" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><polygon fill="#7b2fbe" points="0 0, 10 3.5, 0 7"></polygon></marker>
        </defs>
        <line x1="640" y1="230" x2="640" y2="300" stroke="#d4af37" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-gold)"></line>
        <line x1="640" y1="420" x2="640" y2="530" stroke="#0d7377" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"></line>
        <line x1="320" y1="360" x2="570" y2="360" stroke="#7b2fbe" stroke-width="2" marker-start="url(#arrowhead-purple)" marker-end="url(#arrowhead-purple)"></line>
        <line x1="710" y1="360" x2="960" y2="360" stroke="#d4af37" stroke-width="2" marker-start="url(#arrowhead-gold)" marker-end="url(#arrowhead-gold)"></line>
    </svg>

    <div class="flow-label" style="top: 27%; left: 50%;">방문 기록 저장</div>
    <div class="flow-label" style="top: 73%; left: 50%;">버그 리포트 / 로그</div>
    <div class="flow-label" style="top: 50%; left: 35%;">기록 동기화</div>
    <div class="flow-label" style="top: 50%; left: 65%;">운영 데이터 관리</div>

    <div class="node node-server pos-center">
        <div class="node-icon-wrapper"><i class="fa-solid fa-cloud"></i></div>
        <div class="node-content"><div class="node-title" style="color: #d4af37;">Central DB</div><div class="node-desc">Supabase 통합 관리</div></div>
    </div>
    <div class="node node-qr pos-top">
        <div class="node-icon-wrapper"><i class="fa-solid fa-qrcode"></i></div>
        <div class="node-content"><div class="node-title">QR App</div><div class="node-desc">체크인 데이터 생성</div></div>
    </div>
    <div class="node node-user pos-left">
        <div class="node-icon-wrapper"><i class="fa-solid fa-mobile-screen"></i></div>
        <div class="node-content"><div class="node-title">서랍 (User)</div><div class="node-desc">기록 및 커뮤니티</div></div>
    </div>
    <div class="node node-manager pos-right">
        <div class="node-icon-wrapper"><i class="fa-solid fa-laptop-code"></i></div>
        <div class="node-content"><div class="node-title">Manager App</div><div class="node-desc">전체 운영 관리</div></div>
    </div>
    <div class="node node-dev pos-bottom">
        <div class="node-icon-wrapper"><i class="fa-solid fa-screwdriver-wrench"></i></div>
        <div class="node-content"><div class="node-title">Developer App</div><div class="node-desc">모니터링 및 지원</div></div>
    </div>

    <div style="position: absolute; bottom: 40px; right: 50px; font-size: 0.75rem; color: #64748b; text-align: right; z-index: 10;">
        <p><i class="fa-solid fa-circle text-xs mr-1" style="color: #d4af37;"></i> Admin Flow</p>
        <p><i class="fa-solid fa-circle text-xs mr-1" style="color: #7b2fbe;"></i> User Flow</p>
        <p><i class="fa-solid fa-circle text-xs mr-1" style="color: #0d7377;"></i> Support Flow</p>
    </div>
</div>

<script>
    // 다음 페이지로 (Drawer_page4.html이 없으면 index.html로 돌아가도록 설정 가능)
    document.body.addEventListener('click', () => {
        window.location.href = 'Drawer_page4.html'; 
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') {
            window.location.href = 'Drawer_page4.html';
        } else if (e.key === 'ArrowLeft') {
            window.location.href = 'Drawer_page2.html'; // 이전 페이지로
        }
    });
</script>
</body>
</html>
